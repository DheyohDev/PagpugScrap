version: '3.9'
services:
  app:
    build: .
    container_name: pagpug_app
    restart: unless-stopped
    volumes:
      - storage:/var/www/html/storage
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    env_file:
      - .env
    depends_on:
      - redis
    networks:
      - appnet

  redis:
    image: redis:7
    container_name: pagpug_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - appnet

volumes:
  storage:

networks:
  appnet:
    driver: bridge
